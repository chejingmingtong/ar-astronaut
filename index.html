<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>星际 AR 试衣间</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="AR 试衣">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="arCanvas"></canvas>

        <div class="scan-grid" aria-hidden="true"></div>
        <div class="fit-frame" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="status-pill" id="statusPill">
          <span class="status-dot"></span>
          <span id="statusText">正在准备 AR 识别</span>
        </div>

        <div class="topbar">
          <button class="icon-button back-button" type="button" aria-label="返回">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
          <div class="brand">
            <span class="brand-mark">A</span>
            <span>试衣间</span>
          </div>
          <div class="top-actions">
          <button class="icon-button" id="switchCameraButton" type="button" aria-label="切换前后摄像头">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12a7 7 0 0 1 11.9-5M16 3v4h-4" />
              <path d="M20 12a7 7 0 0 1-11.9 5M8 21v-4h4" />
              <circle cx="12" cy="12" r="2.8" />
            </svg>
          </button>
          <button class="icon-button" id="shareButton" type="button" aria-label="显示扫码入口">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 4h7v7H4zM6 6v3h3V6zM13 4h7v7h-7zM15 6v3h3V6zM4 13h7v7H4zM6 15v3h3v-3zM14 14h2v2h-2zM18 14h2v2h-2zM16 16h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" />
            </svg>
          </button>
          </div>
        </div>

        <div class="control-dock">
          <button class="primary-action" id="startButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 8.5A2.5 2.5 0 0 1 8.5 6h7A2.5 2.5 0 0 1 18 8.5v7a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 6 15.5zM9 4h6l1 2H8z" />
              <circle cx="12" cy="12" r="3.2" />
            </svg>
            <span id="startLabel">开启摄像头</span>
          </button>

          <button class="capture-button" id="captureButton" type="button" aria-label="拍照">
            <span></span>
          </button>
        </div>
      </section>

      <aside class="qr-panel" id="qrPanel" aria-label="二维码入口">
        <div class="qr-card">
          <button class="icon-button close-button" id="closeQrButton" type="button" aria-label="关闭扫码入口">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
          <h1>手机扫码进入 AR 试衣间</h1>
          <div class="qr-box">
            <img id="qrImage" alt="进入网页的二维码" />
          </div>
          <label class="url-label" for="shareUrl">访问地址</label>
          <input id="shareUrl" readonly />
          <p class="hint">手机摄像头需要 HTTPS，部署后将二维码地址换成线上域名即可。</p>
        </div>
      </aside>
    </main>

    <script src="./vendor/qrcode.js?v=drawn-camera-v3"></script>
    <script type="module" src="./app.js?v=drawn-camera-v3"></script>
  </body>
</html>
